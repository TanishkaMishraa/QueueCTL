name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install queuectl (editable) + dev dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black --check)
        run: python -m black --check queuectl tests scripts

      - name: Check import order (isort --check)
        run: python -m isort --check-only queuectl tests scripts

      - name: Run unit tests
        run: pytest -v

      - name: Run repository-layer integration check
        run: python scripts/validate_db.py

      - name: Run end-to-end validation (real CLI + real worker processes)
        run: python scripts/validate_e2e.py
